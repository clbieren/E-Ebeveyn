name: babytracker
description: Offline-first bebek takip uygulaması.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.3.5

  # Local Database
  realm: ^3.4.0

  # Backend & Auth
  supabase_flutter: ^2.5.0

  # Storage
  shared_preferences: ^2.3.2

  # Connectivity
  connectivity_plus: ^6.0.5

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2
  fl_chart: ^1.0.0
  shimmer: ^3.0.0
  uuid: ^4.4.0
  flutter_dotenv: ^6.0.0
  http: ^1.2.2
  flutter_markdown: ^0.7.7+1
  just_audio: ^0.10.5
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  timezone: ^0.11.0
  home_widget: ^0.9.1
  tutorial_coach_mark: ^1.3.3
  syncfusion_flutter_pdfviewer: ^33.1.49
  google_mobile_ads: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  custom_lint: 0.7.6
  riverpod_lint: ^2.3.10
  # LOGO İÇİN GEREKLİ PAKET BURADA:
  flutter_launcher_icons: ^0.13.1

# LOGO DEĞİŞİM AYARLARI (Yol: assets/app_icon.png)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    #- assets/app_icon.png